<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="main-container">
        <div class="header-wrapper">
            <div class="header">
                Header Banner
            </div>
        </div>
        <div class="sidebar-wrapper">
            <div class="dashboard-menu">
                <img src="./images/view-dashboard.svg" class="dashboard-icon" />
                Dashboard
            </div>
            <div class="home-menu">
                <img src="./images/home.svg" class="home-icon sidebar-icon" fill="white" /> Home
            </div>
            <div class="profile-menu">
                <img src="./images/card-account-details-outline.svg" class="profile-icon sidebar-icon" /> Profile
            </div>
            <div class="message-menu">
                <img src="./images/message.svg" class="message-icon sidebar-icon" /> Messages
            </div>
            <div class="history-menu">
                <img src="./images/clock-time-three.svg" class="history-icon sidebar-icon" /> History
            </div>
            <div class="tasks-menu">
                <img src="./images/note-multiple-outline.svg" class="tasks-icon sidebar-icon" /> Tasks
            </div>
            <div class="communities-menu">
                <img src="./images/account-group.svg" class="communities-icon sidebar-icon" /> Communities
            </div>
            <div class="settings-menu">
                <img src="./images/cog.svg" class="settings-icon sidebar-icon" /> Settings
            </div>
            <div class="support-menu">
                <img src="./images/help-box.svg" class="support-icon sidebar-icon" /> Support
            </div>
            <div class="privacy-menu">
                <img src="./images/shield-check.svg" class="privacy-icon sidebar-icon" /> Privacy
            </div>
        </div>
        <div class="main-content-wrapper">
            <div class="project-cards-wrapper">
                <!-- <div class="project-cards">
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                </div> -->
            </div>
            <div class="right-column-wrapper">
                <div class="announcements-wrapper">
                    <div class="announcements">
                        Announcements
                    </div>
                </div>
                <div class="trending-wrapper">
                    <div class="trending">
                        Trending content
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
